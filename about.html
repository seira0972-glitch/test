<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我 - MyWebsite</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-light: #f8f9fa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-light); padding-top: 70px; line-height: 1.6; }
        
        .header-banner {
            height: 30vh;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: -40px auto 60px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            background: #f0f2f5;
            color: #2575fc;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        footer { background: #222; color: #aaa; text-align: center; padding: 30px 0; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="header-banner">
        <h1>關於我</h1>
    </section>

    <main class="container">
        <h2>我的故事</h2>
        <p>我是一名熱愛技術與數據分析的開發者。我相信透過簡約的設計與高效的邏輯，可以解決生活中的複雜問題。</p>
        <p style="margin-top: 15px;">在閒暇之餘，我喜歡研究自動化工具與理財規劃，追求持續的成長與優化。</p>
        
        <h3 style="margin-top: 30px;">核心技能</h3>
        <div class="skill-tags">
            <span class="tag">HTML / CSS</span>
            <span class="tag">JavaScript</span>
            <span class="tag">數據可視化</span>
            <span class="tag">響應式設計</span>
            <span class="tag">UI/UX 基礎</span>
        </div>
    </main>

    <footer><p>&copy; 2026 My Website. 版權所有.</p></footer>

    <script>
        fetch('nav.html').then(r => r.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
            const toggle = document.getElementById('nav-toggle');
            if (toggle) toggle.addEventListener('click', () => document.getElementById('nav-menu').classList.toggle('active'));
        });
    </script>
</body>
</html>
