<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            scroll-behavior: smooth;
        }
        a { color: inherit; text-decoration: none; }
        main { padding: 70px 20px 20px; }
        section { max-width: 1000px; margin: 0 auto 60px; padding: 40px 20px; border-radius: 12px; background: rgba(255,255,255,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1, h2 { margin-top: 0; }
        footer { text-align: center; padding: 20px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); }
        @media (max-width: 768px) { section { padding: 30px 15px; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <section>
            <h1>關於我</h1>
            <p>
                我是一名熱愛設計與前端開發的人，喜歡將想法變成實際可用的網站。  
                熟悉 HTML、CSS、JavaScript，並在學習現代框架和設計工具。  
                希望透過這個網站分享我的作品與經驗。
            </p>
        </section>
    </main>

    <footer>
        &copy; 2026 我的網站 | All rights reserved
    </footer>

    <script>
        fetch('nav.html')
            .then(res => res.ok ? res.text() : Promise.reject('載入失敗'))
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                const menuToggle = document.getElementById('menuToggle');
                const navbarMenu = document.getElementById('navbarMenu');
                if(menuToggle && navbarMenu) menuToggle.addEventListener('click', () => { navbarMenu.classList.toggle('active'); });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
