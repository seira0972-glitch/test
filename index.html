<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的現代個人網站</title>
    <style>
        /* 基礎樣式與全域漸層變數 */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --text-dark: #333;
            --text-light: #fff;
            --bg-light: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-top: 70px; /* 為固定導航欄預留空間 */
        }

        /* 導航欄容器 (由 JS 載入內容) */
        #nav-placeholder {
            width: 100%;
        }

        /* 歡迎區塊 (Hero Section) */
        .hero {
            height: 60vh;
            background: var(--primary-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            opacity: 0.9;
        }

        /* 自我介紹區塊 */
        .about-section {
            max-width: 900px;
            margin: -50px auto 60px; /* 向上偏移營造層次感 */
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .about-section h2 {
            color: #2575fc;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 頁尾 */
        footer {
            background: #222;
            color: #aaa;
            text-align: center;
            padding: 40px 0;
            margin-top: 40px;
        }

        footer p {
            font-size: 0.9rem;
        }

        /* 響應式優化 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .about-section { margin: 20px; }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <section class="hero">
        <h1>歡迎來到我的空間</h1>
        <p>探索創意、技術與數據的交匯點</p>
    </section>

    <main class="about-section">
        <h2>關於我</h2>
        <p>你好！我是一個熱衷於創造數位體驗的人。在這裡，我分享我的專案進度、技術心得以及對未來的展望。</p>
        <p style="margin-top: 15px;">
            我追求簡約而不簡單的設計原則，致力於開發流暢且具有直覺性的網頁應用。
            無論是前端視覺呈現還是後端邏輯處理，我都保持著好奇心不斷學習。
        </p>
    </main>

    <footer>
        <p>&copy; 2026 My Website. 版權所有.</p>
        <p style="margin-top: 10px;">由 HTML5 與 CSS3 精心打造</p>
    </footer>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                
                // 重要：載入後需要重新綁定 nav.html 裡的 JS 邏輯（如果有）
                const toggleButton = document.getElementById('nav-toggle');
                const navMenu = document.getElementById('nav-menu');
                if (toggleButton) {
                    toggleButton.addEventListener('click', () => {
                        navMenu.classList.toggle('active');
                    });
                }
            })
            .catch(error => console.error('無法載入導航欄:', error));
    </script>

</body>
</html>
